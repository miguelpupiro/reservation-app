<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ossobuco | Reserve</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #0d0d0d;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: #141414;
  padding: 30px;
  border-radius: 16px;
  width: 360px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  border: 1px solid rgba(197,157,95,0.2);
}

.hero img {
  width: 100%;
  border-radius: 10px;
  margin-bottom: 15px;
  opacity: 0.85;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 26px;
  margin-bottom: 5px;
  letter-spacing: 1px;
}

.subtitle {
  color: #c59d5f;
  font-size: 12px;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.info {
  color: #aaa;
  font-size: 12px;
  margin-bottom: 20px;
  line-height: 1.5;
}

input {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  background: #1f1f1f;
  border: 1px solid #333;
  color: white;
  border-radius: 8px;
  font-size: 14px;
}

button {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #c59d5f, #e6c78b);
  border: none;
  border-radius: 8px;
  font-weight: bold;
  font-size: 14px;
  cursor: pointer;
  letter-spacing: 1px;
}

button:hover {
  opacity: 0.9;
}

.summary {
  display: none;
  text-align: center;
}

.summary-box {
  background: #1c1c1c;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
}

.summary-box p {
  margin: 6px 0;
  color: #ddd;
}

.loading {
  display: none;
  text-align: center;
  font-size: 14px;
  color: #aaa;
}
</style>
</head>

<body>

<div class="container">

<div class="hero">
<img src="https://images.unsplash.com/photo-1551218808-94e220e084d2">
</div>

<h1>Reserve Your Experience</h1>
<div class="subtitle">Ossobuco Wynwood</div>

<div class="info">
An elevated dining experience inspired by fire, flavor, and craftsmanship.<br><br>
Reservations are currently hosted at our Wynwood location.
</div>

<div id="formSection">

  <input id="date" type="date">
  <input id="time" type="time">
  <input id="party" type="number" placeholder="Number of Guests">

  <button onclick="showSummary()">Check Availability</button>

</div>

<div id="summarySection" class="summary">

  <div class="summary-box">
    <p id="summaryDate"></p>
    <p id="summaryTime"></p>
    <p id="summaryParty"></p>
    <p id="summaryType"></p>
  </div>

  <button onclick="goToBooking()">Continue</button>
  <button onclick="goBack()">Modify</button>

</div>

<div id="loading" class="loading">
Checking availability...
</div>

</div>

<script>
let reservationData = {};

function showSummary() {
  const date = document.getElementById("date").value;
  const time = document.getElementById("time").value;
  const party = document.getElementById("party").value;

  if (!date || !time || !party) {
    alert("Please complete all fields");
    return;
  }

  reservationData = { date, time, party };

  document.getElementById("summaryDate").innerText = date;
  document.getElementById("summaryTime").innerText = time;
  document.getElementById("summaryParty").innerText = party + " Guests";

  if (parseInt(party) > 6) {
    document.getElementById("summaryType").innerText =
      "Private Dining Experience – Wynwood";
  } else {
    document.getElementById("summaryType").innerText =
      "Dining at Wynwood";
  }

  document.getElementById("formSection").style.display = "none";
  document.getElementById("summarySection").style.display = "block";
}

function goBack() {
  document.getElementById("summarySection").style.display = "none";
  document.getElementById("formSection").style.display = "block";
}

function goToBooking() {

  const sheetURL = "https://script.google.com/macros/s/AKfycbzqVcHr4S4JDwvpGx2TMuIyvhzvv2zDrmKrZLE29nHXQb2la-LF2lEhJRs2m3wPuYD3lQ/exec";

  document.getElementById("summarySection").style.display = "none";
  document.getElementById("loading").style.display = "block";

  fetch(sheetURL, {
    method: "POST",
    body: JSON.stringify({
      date: reservationData.date,
      time: reservationData.time,
      party: reservationData.party,
      location: "Wynwood",
      source: "google"
    })
  });

  setTimeout(() => {
    const partySize = parseInt(reservationData.party);

    if (partySize > 6) {
      window.open("https://ossobucoholdingllc.tripleseat.com/party_request/47505", "_blank");
    } else {
      window.open("https://www.opentable.com/r/ossobuco-wynwood", "_blank");
    }
  }, 800);
}
</script>

</body>
</html>
