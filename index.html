<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ossobuco | Reserve</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #F6F2EB;
  color: #1F3059;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: #ffffff;
  padding: 30px;
  border-radius: 12px;
  width: 360px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.06);
}

/* HERO IMAGE */
.hero img {
  width: 100%;
  border-radius: 8px;
  margin-bottom: 15px;
}

/* TYPOGRAPHY */
h1 {
  font-family: 'Playfair Display', serif;
  font-size: 26px;
  margin-bottom: 5px;
}

.subtitle {
  font-size: 13px;
  opacity: 0.7;
  margin-bottom: 10px;
}

.info {
  font-size: 13px;
  line-height: 1.6;
  opacity: 0.75;
  margin-bottom: 20px;
}

/* INPUTS */
input, select {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  background: #F6F2EB;
  border: 1px solid #e5e0d8;
  color: #1F3059;
  border-radius: 6px;
}

/* PRIMARY BUTTON */
.primary-btn {
  width: 100%;
  padding: 14px;
  background: #F5D0C9;
  color: #1F3059;
  border: none;
  border-radius: 6px;
  font-weight: 600;
  cursor: pointer;
  margin-bottom: 10px;
  transition: all 0.25s ease;
}

.primary-btn:hover {
  opacity: 0.9;
}

/* SECONDARY BUTTON */
.secondary-btn {
  width: 100%;
  padding: 14px;
  background: transparent;
  color: #1F3059;
  border: 1px solid #1F3059;
  border-radius: 6px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.25s ease;
}

.secondary-btn:hover {
  background: #1F3059;
  color: #F6F2EB;
}

/* SUMMARY */
.summary {
  display: none;
}

.summary-box {
  background: #F6F2EB;
  padding: 20px;
  border-radius: 8px;
  margin-bottom: 20px;
}

/* LOADING */
.loading {
  display: none;
  text-align: center;
  font-size: 14px;
  opacity: 0.7;
}

</style>
</head>

<body>

<div class="container">

<div class="hero">
  <img src="hero.jpg">
</div>

<h1>Reserve Your Experience</h1>
<div class="subtitle">Ossobuco Wynwood</div>

<div class="info">
An elevated dining experience inspired by fire, flavor, and craftsmanship.<br><br>
Reservations are currently hosted at our Wynwood location.
</div>

<!-- FORM -->
<div id="formSection">

  <input id="date" type="date">

  <select id="time">
    <option value="">Select time</option>
  </select>

  <input id="party" type="number" placeholder="Number of Guests">

  <button class="primary-btn" onclick="showSummary()">Check Availability</button>

</div>

<!-- SUMMARY -->
<div id="summarySection" class="summary">

  <div class="summary-box">
    <p id="summaryDate"></p>
    <p id="summaryTime"></p>
    <p id="summaryParty"></p>
  </div>

  <button class="primary-btn" onclick="goToBooking()">Continue</button>
  <button class="secondary-btn" onclick="goBack()">Modify</button>

</div>

<!-- LOADING -->
<div id="loading" class="loading">
Checking availability...
</div>

</div>

<script>

/* BUSINESS HOURS */
const businessHours = {
  0: { open: "16:00", close: "22:00" },
  1: { open: "16:00", close: "22:00" },
  2: { open: "16:00", close: "22:00" },
  3: { open: "16:00", close: "22:00" },
  4: { open: "16:00", close: "23:00" },
  5: { open: "16:00", close: "23:00" },
  6: { open: "16:00", close: "23:00" }
};

/* PREVENT PAST DATES */
const today = new Date().toISOString().split("T")[0];
document.getElementById("date").setAttribute("min", today);

/* GENERATE TIME SLOTS */
document.getElementById("date").addEventListener("change", function () {
  const selectedDate = new Date(this.value);
  const day = selectedDate.getDay();
  const timeSelect = document.getElementById("time");

  timeSelect.innerHTML = '<option value="">Select time</option>';

  const hours = businessHours[day];

  if (!hours) {
    alert("Closed this day");
    this.value = "";
    return;
  }

  let current = timeToMinutes(hours.open);
  const end = timeToMinutes(hours.close);

  while (current <= end) {
    const timeStr = minutesToTime(current);

    const option = document.createElement("option");
    option.value = timeStr;
    option.textContent = formatDisplayTime(timeStr);

    timeSelect.appendChild(option);

    current += 30;
  }
});

/* HELPERS */
function timeToMinutes(t) {
  const [h, m] = t.split(":").map(Number);
  return h * 60 + m;
}

function minutesToTime(m) {
  const h = String(Math.floor(m / 60)).padStart(2, "0");
  const min = String(m % 60).padStart(2, "0");
  return `${h}:${min}`;
}

function formatDisplayTime(t) {
  const [h, m] = t.split(":");
  let hour = parseInt(h);
  const ampm = hour >= 12 ? "PM" : "AM";
  hour = hour % 12 || 12;
  return `${hour}:${m} ${ampm}`;
}

/* DATA */
let reservationData = {};

/* VALIDATION + SUMMARY */
function showSummary() {

  const date = document.getElementById("date").value;
  const time = document.getElementById("time").value;
  const party = document.getElementById("party").value;

  if (!date || !time || !party) {
    alert("Please complete all fields");
    return;
  }

  reservationData = { date, time, party };

  document.getElementById("summaryDate").innerText = date;
  document.getElementById("summaryTime").innerText = time;
  document.getElementById("summaryParty").innerText = party + " Guests";

  document.getElementById("formSection").style.display = "none";
  document.getElementById("summarySection").style.display = "block";
}

/* BACK */
function goBack() {
  document.getElementById("summarySection").style.display = "none";
  document.getElementById("formSection").style.display = "block";
}

/* BOOKING */
function goToBooking() {

  const sheetURL = "https://script.google.com/macros/s/AKfycbzqVcHr4S4JDwvpGx2TMuIyvhzvv2zDrmKrZLE29nHXQb2la-LF2lEhJRs2m3wPuYD3lQ/exec";

  document.getElementById("summarySection").style.display = "none";
  document.getElementById("loading").style.display = "block";

  fetch(sheetURL, {
    method: "POST",
    body: JSON.stringify({
      date: reservationData.date,
      time: reservationData.time,
      party: reservationData.party,
      location: "Wynwood",
      source: "google"
    }),
    headers: {
      "Content-Type": "application/json"
    }
  });

  setTimeout(() => {

    const partySize = parseInt(reservationData.party);

    if (partySize > 6) {
      window.open("https://ossobucoholdingllc.tripleseat.com/party_request/47505", "_blank");
    } else {
      window.open("https://www.opentable.com/r/ossobuco-wynwood", "_blank");
    }

  }, 800);
}

</script>

</body>
</html>
